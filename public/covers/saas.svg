    <circle cx="500" cy="320" r="22" opacity="0.85"/>
    <circle cx="500" cy="500" r="30" opacity="0.95"/>
    <circle cx="330" cy="600" r="20" opacity="0.8"/>
  </g>
  <g fill="#ffffff" opacity="0.16">
